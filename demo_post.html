<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPENCHS - Post Call Transcription</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #180900 0%, #2a1a0f 50%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 53, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 140, 66, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(24, 9, 0, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 
                0 20px 40px rgba(24, 9, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.5), transparent);
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 50%, #ffb366 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.3px;
        }

        .upload-section {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 
                0 15px 35px rgba(24, 9, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .upload-area {
            border: 2px dashed rgba(255, 107, 53, 0.3);
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            background: rgba(255, 107, 53, 0.03);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: rgba(255, 107, 53, 0.6);
            background: rgba(255, 107, 53, 0.08);
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.15);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            color: rgba(255, 107, 53, 0.6);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.3));
        }

        .upload-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
        }

        .upload-subtext {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: #180900;
            border: none;
            padding: 15px 30px;
            border-radius: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 53, 0.4);
        }

        .options-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .option-group {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
        }

        .option-group label {
            display: block;
            font-weight: 600;
            color: #ff6b35;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .option-group select {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 15px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }

        .option-group select option {
            background: #180900;
            color: #ffffff;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #ff6b35;
        }

        .checkbox-group label {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: none;
            letter-spacing: normal;
            color: rgba(255, 255, 255, 0.9);
        }

        .process-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: #180900;
            border: none;
            padding: 18px 32px;
            border-radius: 18px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        .process-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(255, 107, 53, 0.4);
        }

        .process-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-section {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 
                0 15px 35px rgba(24, 9, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            display: none;
        }

        .status-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .status-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 10px;
        }

        .task-id {
            font-family: 'Monaco', 'Menlo', monospace;
            background: rgba(255, 107, 53, 0.1);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 107, 53, 0.2);
        }

        .progress-container {
            margin: 30px 0;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            border-radius: 10px;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        .current-step {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 107, 53, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(255, 107, 53, 0.2);
        }

        .current-step .step-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .current-step .step-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ff6b35;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 107, 53, 0.3);
            border-radius: 50%;
            border-top-color: #ff6b35;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results-section {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 
                0 20px 40px rgba(24, 9, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            display: none;
        }

        .results-header {
            background: rgba(255, 107, 53, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
            color: #ff6b35;
            font-weight: 700;
            font-size: 1.3rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 107, 53, 0.15);
            letter-spacing: 0.3px;
        }

        .results-content {
            padding: 30px;
        }

        .result-section {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 25px;
            animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .result-section h4 {
            color: #ff6b35;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            font-weight: 500;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .info-item .label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-weight: 600;
            color: #ff6b35;
            font-size: 1rem;
        }

        .classification-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .classification-item {
            background: rgba(255, 107, 53, 0.08);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 107, 53, 0.2);
            text-align: center;
        }

        .classification-item .label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .classification-item .value {
            font-weight: 700;
            color: #ff6b35;
            font-size: 1.1rem;
        }

        .confidence-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            border-radius: 3px;
            transition: width 0.8s ease;
        }

        .processing-steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .step-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
        }

        .step-item .step-name {
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .step-item .step-duration {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .step-item .step-status {
            font-size: 0.8rem;
            color: #4ade80;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .header {
                padding: 30px 25px;
                border-radius: 22px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .upload-section, .status-section, .results-section {
                padding: 25px;
                border-radius: 20px;
            }
            
            .upload-area {
                padding: 40px 20px;
            }
            
            .upload-icon {
                font-size: 3rem;
            }
            
            .options-section {
                grid-template-columns: 1fr;
            }
            
            .info-grid, .classification-grid, .processing-steps {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to OPENCHS Post Call Transcription Module</h1>
            <div class="subtitle">Upload & Process Audio Files with AI Analysis</div>
        </div>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">🎵</div>
                <div class="upload-text">Drop your audio file here</div>
                <div class="upload-subtext">or click to browse (WAV, MP3, M4A supported)</div>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    Choose File
                </button>
                <input type="file" id="fileInput" class="file-input" accept="audio/*">
            </div>

            <div class="options-section">
                <div class="option-group">
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="sw">Swahili (sw)</option>
                        <option value="en">English (en)</option>
                        <option value="auto">Auto Detect</option>
                    </select>
                </div>

                <div class="option-group">
                    <label>Processing Options</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="includeTranslation" checked>
                        <label for="includeTranslation">Include Translation</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="includeInsights" checked>
                        <label for="includeInsights">Include AI Insights</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="backgroundProcessing" checked>
                        <label for="backgroundProcessing">Background Processing</label>
                    </div>
                </div>
            </div>

            <button class="process-btn" id="processBtn" disabled>
                Process Audio File
            </button>
        </div>

        <div class="status-section" id="statusSection">
            <div class="status-header">
                <h3>Processing Audio</h3>
                <div class="task-id" id="taskId">Task ID: Loading...</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0% Complete</div>
            </div>

            <div class="current-step" id="currentStep">
                <div class="step-label">Current Step</div>
                <div class="step-name">Initializing...</div>
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                📊 Processing Results
            </div>
            <div class="results-content" id="resultsContent">
                <!-- Results will be populated here -->
            </div>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let pollingInterval = null;
        
        const API_BASE = 'http://192.168.8.18:8124';
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const processBtn = document.getElementById('processBtn');
        const statusSection = document.getElementById('statusSection');
        const resultsSection = document.getElementById('resultsSection');

        // File upload handling
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('dragleave', handleDragLeave);
        uploadArea.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);
        processBtn.addEventListener('click', processAudio);

        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        function handleFile(file) {
            // Validate file type
            const validTypes = ['audio/wav', 'audio/mpeg', 'audio/mp3', 'audio/m4a', 'audio/x-m4a'];
            if (!validTypes.includes(file.type) && !file.name.match(/\.(wav|mp3|m4a)$/i)) {
                showError('Please select a valid audio file (WAV, MP3, M4A)');
                return;
            }

            // Update UI
            const uploadText = uploadArea.querySelector('.upload-text');
            const uploadSubtext = uploadArea.querySelector('.upload-subtext');
            const uploadIcon = uploadArea.querySelector('.upload-icon');
            
            uploadIcon.textContent = '✅';
            uploadText.textContent = file.name;
            uploadSubtext.textContent = `${(file.size / (1024 * 1024)).toFixed(2)} MB`;
            
            processBtn.disabled = false;
            processBtn.textContent = 'Process Audio File';
        }

        async function processAudio() {
            const file = fileInput.files[0];
            if (!file) {
                showError('Please select an audio file first');
                return;
            }

            // Prepare form data
            const formData = new FormData();
            formData.append('audio', file);
            formData.append('language', document.getElementById('language').value);
            formData.append('include_translation', document.getElementById('includeTranslation').checked);
            formData.append('include_insights', document.getElementById('includeInsights').checked);
            formData.append('background', document.getElementById('backgroundProcessing').checked);

            try {
                processBtn.disabled = true;
                processBtn.innerHTML = '<span class="spinner"></span>Uploading...';

                // Upload file
                const response = await fetch(`${API_BASE}/audio/process`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                currentTaskId = result.task_id;

                // Show status section
                statusSection.style.display = 'block';
                document.getElementById('taskId').textContent = `Task ID: ${currentTaskId}`;
                
                // Start polling
                startPolling();

            } catch (error) {
                console.error('Upload error:', error);
                showError('Failed to upload file: ' + error.message);
                processBtn.disabled = false;
                processBtn.textContent = 'Process Audio File';
            }
        }

        function startPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }

            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${API_BASE}/audio/task/${currentTaskId}`);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const status = await response.json();
                    updateStatus(status);

                    if (status.status === 'completed') {
                        clearInterval(pollingInterval);
                        showResults(status.result);
                    } else if (status.status === 'failed') {
                        clearInterval(pollingInterval);
                        showError('Processing failed: ' + (status.error || 'Unknown error'));
                    }

                } catch (error) {
                    console.error('Polling error:', error);
                    clearInterval(pollingInterval);
                    showError('Failed to check status: ' + error.message);
                }
            }, 5000); // Poll every 5 seconds
        }

        function updateStatus(status) {
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const currentStep = document.getElementById('currentStep');

            // Update progress
            const progress = status.progress || 0;
            progressFill.style.width = `${progress}%`;
            progressText.textContent = `${progress}% Complete`;

            // Update current step
            const stepName = currentStep.querySelector('.step-name');
            if (status.current_step) {
                stepName.innerHTML = `<span class="spinner"></span>${status.current_step.charAt(0).toUpperCase() + status.current_step.slice(1)}`;
            } else {
                stepName.textContent = status.status.charAt(0).toUpperCase() + status.status.slice(1);
            }
        }

        function showResults(result) {
            resultsSection.style.display = 'block';
            const resultsContent = document.getElementById('resultsContent');
            
            let html = '';

            // Audio Info
            if (result.result.audio_info) {
                const info = result.result.audio_info;
                html += `
                    <div class="result-section">
                        <h4>📁 Audio Information</h4>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">Filename</div>
                                <div class="value">${info.filename}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">File Size</div>
                                <div class="value">${info.file_size_mb} MB</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Language</div>
                                <div class="value">${info.language_specified}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Processing Time</div>
                                <div class="value">${info.processing_time.toFixed(2)}s</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Transcript
            if (result.result.transcript) {
                html += `
                    <div class="result-section">
                        <h4>📝 Transcript</h4>
                        <div class="result-content">${result.result.transcript}</div>
                    </div>
                `;
            }

            // Translation
            if (result.result.translation) {
                html += `
                    <div class="result-section">
                        <h4>🌐 Translation</h4>
                        <div class="result-content">${result.result.translation}</div>
                    </div>
                `;
            }

            // Classification
            if (result.result.classification) {
                const classification = result.result.classification;
                html += `
                    <div class="result-section">
                        <h4>🏷 Classification</h4>
                        <div class="classification-grid">
                            <div class="classification-item">
                                <div class="label">Main Category</div>
                                <div class="value">${classification.main_category}</div>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${(classification.confidence_breakdown.main_category * 100)}%"></div>
                                </div>
                            </div>
                            <div class="classification-item">
                                <div class="label">Sub Category</div>
                                <div class="value">${classification.sub_category}</div>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${(classification.confidence_breakdown.sub_category * 100)}%"></div>
                                </div>
                            </div>
                            <div class="classification-item">
                                <div class="label">Intervention</div>
                                <div class="value">${classification.intervention}</div>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${(classification.confidence_breakdown.intervention * 100)}%"></div>
                                </div>
                            </div>
                            <div class="classification-item">
                                <div class="label">Priority</div>
                                <div class="value">${classification.priority}</div>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${(classification.confidence_breakdown.priority * 100)}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Summary
            if (result.result.summary) {
                html += `
                    <div class="result-section">
                        <h4>📋 Summary</h4>
                        <div class="result-content">${result.result.summary}</div>
                    </div>
                `;
            }

            // Entities
            if (result.result.entities) {
                const entities = result.result.entities;
                let entitiesHtml = '';
                for (const [type, values] of Object.entries(entities)) {
                    if (values.length > 0) {
                        entitiesHtml += `
                            <div class="info-item">
                                <div class="label">${type}</div>
                                <div class="value">${values.join(', ')}</div>
                            </div>
                        `;
                    }
                }
                if (entitiesHtml) {
                    html += `
                        <div class="result-section">
                            <h4>🏷 Named Entities</h4>
                            <div class="info-grid">
                                ${entitiesHtml}
                            </div>
                        </div>
                    `;
                }
            }

            // Insights
            if (result.result.insights) {
                const insights = result.result.insights;
                html += `
                    <div class="result-section">
                        <h4>🧠 AI Insights</h4>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">Risk Level</div>
                                <div class="value">${insights.risk_assessment.risk_level}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Case Complexity</div>
                                <div class="value">${insights.case_overview.case_complexity}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Primary Language</div>
                                <div class="value">${insights.case_overview.primary_language}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Risk Indicators</div>
                                <div class="value">${insights.risk_assessment.risk_indicators_found}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Processing Steps
            if (result.result.processing_steps) {
                const steps = result.result.processing_steps;
                let stepsHtml = '';
                for (const [stepName, stepData] of Object.entries(steps)) {
                    stepsHtml += `
                        <div class="step-item">
                            <div class="step-name">${stepName}</div>
                            <div class="step-duration">${stepData.duration.toFixed(3)}s</div>
                            <div class="step-status">${stepData.status}</div>
                        </div>
                    `;
                }
                html += `
                    <div class="result-section">
                        <h4>⚙ Processing Steps</h4>
                        <div class="processing-steps">
                            ${stepsHtml}
                        </div>
                    </div>
                `;
            }

            // Pipeline Info
            if (result.result.pipeline_info) {
                const pipeline = result.result.pipeline_info;
                html += `
                    <div class="result-section">
                        <h4>🔧 Pipeline Information</h4>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">Total Time</div>
                                <div class="value">${pipeline.total_time.toFixed(3)}s</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Models Used</div>
                                <div class="value">${pipeline.models_used.join(', ')}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Processed By</div>
                                <div class="value">${pipeline.processed_by}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Timestamp</div>
                                <div class="value">${new Date(pipeline.timestamp).toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            resultsContent.innerHTML = html;

            // Reset form
            processBtn.disabled = false;
            processBtn.textContent = 'Process Another File';
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            
            // Insert after upload section
            const uploadSection = document.querySelector('.upload-section');
            uploadSection.parentNode.insertBefore(errorDiv, uploadSection.nextSibling);
            
            // Remove after 5 seconds
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }
    </script>
</body>
</html>
